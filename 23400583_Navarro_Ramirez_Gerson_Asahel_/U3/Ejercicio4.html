<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>

        <link rel="stylesheet" href="CSS/estiloEjercicio4.css">
    </head>
    <body>

    <div class="container">
        <!-- Sección Izquierda -->
        <div class="section-izquierda">
            <h1>facebook</h1>
            <p>Facebook te ayuda a comunicarte y compartir con las personas que forman parte de tu vida.</p>
        </div>

        <!-- Sección Derecha -->
        <div class="section-derecha">
            <div class="card">
                <form>
                    <div class="form-group">
                        <input type="text" placeholder="Correo electrónico o número de teléfono" required>
                    </div>
                    <div class="form-group">
                        <input type="password" placeholder="Contraseña" required>
                    </div>
                    <button type="submit" class="btn-login">Iniciar sesión</button>
                    
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    
                    <hr>
                    
                    <a href="#" class="btn-register">Crear cuenta nueva</a>
                </form>
            </div>
            
            <p class="footer-text">
                <a href="#">Crea una página</a> para una celebridad, una marca o un negocio.
            </p>
        </div>
    </div>

</body>
</html>
