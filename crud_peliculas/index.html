<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>CRUD de peliculas</title>

        <link rel="stylesheet" href="styles.css">
    </head>
    <body id="body">
        <h1 id="h1"> CRUD de Peliculas</h1>
        <form id="form">
            <input type="hidden" placeholder="Id" id="id">
            <input type="text" placeholder="Titulo" id="titulo">
            <input type="text" placeholder="Director" id="director">
            <input type="number" placeholder="Año" id="año">
            <button type="submit" >Guardar</button>
        </form>
        <table>
            <thead>
                <tr>
                    <TH>ID</TH>
                    <TH>Titulo</TH>
                    <TH>Director</TH>
                    <TH>Año</TH>
                    <TH>Acciones</TH>
                </tr>

            </thead>
            <tbody id="tablaPeliculas"></tbody>
        </table>
        <script src="script.js"></script>
    </body>
</html>
